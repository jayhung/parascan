# open redirect payloads
redirects:
  - "https://evil.com"
  - "//evil.com"
  - "http://evil.com"
  - "/\\evil.com"
  - "///evil.com"
  - "https:evil.com"
  - "//evil.com/%2f.."
  - "////evil.com"
  - "https://evil.com@legitimate.com"
  - "https://legitimate.com.evil.com"
  - "//evil%00.com"
  - "//evil.com\\@legitimate.com"
  - "https://evil.com#legitimate.com"
  - "https://evil.com?legitimate.com"
  - "/redirect?url=https://evil.com"

# parameter names commonly used for redirects
redirect_params:
  - url
  - redirect
  - redirect_url
  - redirect_uri
  - return
  - return_url
  - returnTo
  - next
  - next_url
  - dest
  - destination
  - go
  - goto
  - target
  - link
  - rurl
  - continue
  - forward
  - out
  - view
  - ref

# the domain used in payloads to detect redirect
canary_domain: "evil.com"
