# CSRF test patterns

# state-changing HTTP methods to check for CSRF protection
state_changing_methods:
  - POST
  - PUT
  - PATCH
  - DELETE

# common CSRF token field names
token_field_names:
  - csrf
  - csrf_token
  - _csrf
  - csrfmiddlewaretoken
  - _token
  - authenticity_token
  - __RequestVerificationToken
  - anticsrf
  - CSRFToken
  - XSRF-TOKEN
  - X-CSRF-Token
  - X-XSRF-TOKEN

# common CSRF token header names
token_header_names:
  - X-CSRF-Token
  - X-XSRF-Token
  - X-Requested-With
